<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Random Repository of tomashubelbauer</title>
    <script>
      window.addEventListener('load', async () => {
        const response = await fetch('repositories.json');
        const data = await response.json();
        const repositories = Object.keys(data);
        const random = ~~(Math.random() * repositories.length);
        const repository = repositories[random];

        document.body.innerHTML = '';

        const a = document.createElement('a');
        a.dataset.countdown = 15;
        a.dataset.repository = repository;
        a.textContent = `${repository} (${a.dataset.countdown})`;
        a.href = 'https://github.com/tomashubelbauer/' + repository;
        document.body.append(a);

        const button = document.createElement('button');
        button.textContent = 'Refresh';
        button.addEventListener('click', () => window.location.reload());
        document.body.append(button);

        if (window.location.search === '?now') {
          a.click();
        }

        setInterval(() => {
          a.dataset.countdown = Number(a.dataset.countdown) - 1;
          a.textContent = `${repository} (${a.dataset.countdown})`;
          if (a.dataset.countdown === '0') {
            a.click();
          }
        }, 1000);
      });
    </script>
    <style>
      body {
        align-items: center;
        display: flex;
        flex-direction: column;
      }
    </style>
  </head>
  <body>
    Loading…
  </body>
</html>
